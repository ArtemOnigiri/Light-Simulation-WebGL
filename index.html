<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Rainbow</title>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: #000;
		}
		body {
			display: flex;
			align-items: center;
			justify-content: center;
		}
		canvas {
			display: block;
		}
		#explainer-btn {
			position: fixed;
			top: 20px;
			left: 20px;
			z-index: 10;
			padding: 12px 28px;
			background: linear-gradient(135deg, rgba(99, 102, 241, 0.8), rgba(168, 85, 247, 0.8));
			color: #fff;
			border: 1px solid rgba(255, 255, 255, 0.25);
			border-radius: 12px;
			font: 700 16px/1 system-ui, sans-serif;
			letter-spacing: 0.5px;
			cursor: pointer;
			backdrop-filter: blur(10px);
			box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
			transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
		}
		#explainer-btn:hover {
			background: linear-gradient(135deg, rgba(99, 102, 241, 1), rgba(168, 85, 247, 1));
			box-shadow: 0 6px 24px rgba(99, 102, 241, 0.5);
			transform: translateY(-1px);
		}
		#explainer-btn:active {
			transform: translateY(0);
			box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
		}
	</style>
</head>
<body>
	<canvas id="cnv"></canvas>
	<button id="explainer-btn" onclick="window.open('index-explainer.html','_blank')">&#10024; Explainer</button>
	<script type="text/javascript" src="src/wave-shader.js"></script>
	<script type="text/javascript" src="src/render-shader.js"></script>
	<script type="text/javascript" src="src/original-shader.js"></script>
	<script type="text/javascript" src="src/logic.js"></script>
</body>
</html>
